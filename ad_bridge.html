<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অপেক্ষা করুন | Ad Bridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #000; color: white; margin: 0; overflow: hidden; }
        .ad-viewport { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #111; }
        .ad-img { width: 100%; height: 100%; object-fit: cover; opacity: 1; transition: opacity 0.5s ease; }
        .controls { position: fixed; top: 20px; right: 20px; z-index: 100; text-align: right; }
        .btn { background: #fbbf24; color: #000; font-weight: bold; padding: 12px 24px; border-radius: 12px; cursor: pointer; border: none; transition: 0.3s; box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3); }
        .btn:hover { background: #f59e0b; transform: scale(1.05); }
        .timer { background: rgba(0,0,0,0.85); padding: 12px 20px; border: 2px solid #fbbf24; border-radius: 12px; display: none; margin-top: 10px; font-weight: bold; color: #fbbf24; font-size: 1.2rem; }
    </style>
</head>
<body>

    <audio id="bg-music" src="../music.mp3" loop></audio>

    <div class="ad-viewport">
        <a id="ad-link" href="#" target="_blank">
            <img id="ad-img" src="" class="ad-img" alt="Advertisement">
        </a>
    </div>

    <div class="controls">
        <button id="skip-btn" onclick="startTimer()" class="btn">CONTINUE TO TARGET <i class="fa-solid fa-arrow-right ml-2"></i></button>
        <div id="timer-box" class="timer tracking-widest">REDIRECTING IN: <span id="sec">15</span>s</div>
    </div>

    <script>
        let ads = [];
        let currentAdIndex = 0;
        let isTimerStarted = false; // ডাবল টাইমার ঠেকানোর জন্য
        const urlParams = new URLSearchParams(window.location.search);
        const targetUrl = urlParams.get('target');

        async function loadAds() {
            try {
                // ক্যাশ বাস্টার যাতে নতুন অ্যাড লিস্ট আসে
                const res = await fetch('../ad_data.json?v=' + new Date().getTime());
                if (!res.ok) throw new Error("Ad file missing");
                
                ads = await res.json();
                
                if(ads.length > 0) {
                    // প্রথম অ্যাডটি সাথে সাথে লোড করা (কালো স্ক্রিন এড়াতে)
                    const img = document.getElementById('ad-img');
                    img.src = ads[0].img;
                    document.getElementById('ad-link').href = ads[0].link;
                    
                    // ৩ সেকেন্ড পর পর অ্যাড রোটেশন শুরু
                    setInterval(showAd, 3000); 
                }
            } catch (e) { console.error("Ads failed:", e); }
        }

        function showAd() {
            if (ads.length === 0) return;
            currentAdIndex = (currentAdIndex + 1) % ads.length;
            const ad = ads[currentAdIndex];
            const img = document.getElementById('ad-img');
            
            // স্মুথ ফেইড ইফেক্ট
            img.style.opacity = 0.4;
            setTimeout(() => {
                img.src = ad.img;
                document.getElementById('ad-link').href = ad.link;
                img.style.opacity = 1;
            }, 300);
        }

        function startTimer() {
            if(isTimerStarted) return; // একবার শুরু হলে আর কাজ করবে না
            isTimerStarted = true;

            const audio = document.getElementById('bg-music');
            if(audio) audio.play().catch(e => {});

            document.getElementById('skip-btn').style.display = 'none';
            document.getElementById('timer-box').style.display = 'block';
            
            let count = 15; // ফিক্সড ১৫ সেকেন্ড
            const interval = setInterval(() => {
                count--;
                document.getElementById('sec').innerText = count;
                if(count <= 0) {
                    clearInterval(interval);
                    // টার্গেট পেজে রিডাইরেক্ট
                    window.location.href = targetUrl ? targetUrl : '../index.html';
                }
            }, 1000);
        }

        window.onload = loadAds;
    </script>
</body>
</html>
